# Stereo downmix coefficients applied when DTS is decoded to 2.0 PCM.
# Edit these values, then either reboot or, for an immediate change, delete
# /tmp/gstcool.conf and re-run /var/lib/webosbrew/dts_restore/init_dts.sh.
#
#   front   front L/R gain      center  center channel gain (dialogue)
#   lfe     subwoofer gain      rear    surround L/R gain
#   rear2   back-surround gain (7.1 content)
front=1.25
center=0.75
lfe=0.75
rear=0.75
rear2=0.70
